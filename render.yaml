# Ledger — AI Bookkeeping for Builders
# Next.js + external Postgres (Neon, Supabase, or any Postgres 16 provider).
# Render free tier allows only one managed Postgres per account, so the DB is hosted externally.

services:
  - type: web
    name: ledger
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false   # paste Neon/Supabase connection string here
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false   # paste your Render URL after first deploy
      - key: OPENAI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false   # optional
      - key: GOOGLE_API_KEY
        sync: false   # optional
      # Stripe — optional, only if billing is enabled
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
