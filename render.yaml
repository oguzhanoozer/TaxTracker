# Ledger — AI Bookkeeping for Builders
# Next.js + Postgres.

databases:
  - name: ledger-db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: ledger
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: ledger-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false   # paste your Render URL after first deploy
      - key: OPENAI_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false   # optional — comment out if unused
      - key: GOOGLE_API_KEY
        sync: false   # optional — comment out if unused
      # Stripe — optional, only if billing is enabled
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
